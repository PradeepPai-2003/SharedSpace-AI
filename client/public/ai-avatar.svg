<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2387" />
      <stop offset="50%" stop-color="#E94057" />
      <stop offset="100%" stop-color="#F27121" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="url(#avatarGrad)" />
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3" />
  <!-- Robot Face Outline -->
  <rect x="28" y="32" width="44" height="36" rx="10" fill="#1e1e2f" stroke="#ffffff" stroke-width="2.5" />
  <!-- Robot Ears -->
  <rect x="22" y="44" width="6" height="12" rx="3" fill="#ffffff" />
  <rect x="72" y="44" width="6" height="12" rx="3" fill="#ffffff" />
  <!-- Robot Eyes (Glowing) -->
  <circle cx="40" cy="50" r="4" fill="#00ffcc" filter="url(#glow)" />
  <circle cx="60" cy="50" r="4" fill="#00ffcc" filter="url(#glow)" />
  <!-- Robot Mouth/Data line -->
  <path d="M 42 58 L 58 58" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  <!-- Antenna -->
  <rect x="48" y="20" width="4" height="12" fill="#ffffff" />
  <circle cx="50" cy="18" r="4" fill="#F27121" />
</svg>
